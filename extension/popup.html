<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groq Transcriber Config</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-wrapper">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="logo-icon">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <h1>Groq Transcriber</h1>
      </div>
      <span class="version-tag">v4.1.0</span>
    </header>

    <main class="app-main">
      <!-- Sección de Credenciales -->
      <section class="config-section">
        <label for="apiKey">API Key de Groq</label>
        <div class="input-group">
          <input type="password" id="apiKey" placeholder="gsk_..." autocomplete="off">
          <button id="toggleVisibility" class="btn-icon" title="Ver / Ocultar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Selección de Modelo -->
      <section class="config-section">
        <label for="modelSelect">Modelo de Whisper</label>
        <select id="modelSelect" class="form-select">
          <option value="whisper-large-v3-turbo">whisper-large-v3-turbo (Ultrarrápido)</option>
          <option value="whisper-large-v3">whisper-large-v3 (Alta precisión)</option>
        </select>
      </section>

      <!-- Interruptores / Extras -->
      <section class="config-section row-layout">
        <div class="toggle-control">
          <span class="control-label">Interfaz compacta en WhatsApp</span>
          <label class="switch">
            <input type="checkbox" id="uiCompact" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </section>

      <!-- Panel de Cuota y Rate Limit -->
      <section class="config-section quota-panel">
        <div class="panel-header">
          <h2>Límites de Cuota (Groq Free Tier)</h2>
          <span class="health-indicator status-ok" id="healthStatus">OK</span>
        </div>

        <div class="quota-bars">
          <div class="quota-item">
            <div class="quota-info">
              <span>Peticiones / minuto</span>
              <span id="reqMinText">0 / 20</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill fill-green" id="reqMinFill" style="width: 0%"></div>
            </div>
          </div>

          <div class="quota-item">
            <div class="quota-info">
              <span>Peticiones / día</span>
              <span id="reqDayText">0 / 2000</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill fill-green" id="reqDayFill" style="width: 0%"></div>
            </div>
          </div>

          <div class="quota-item">
            <div class="quota-info">
              <span>Segundos audio / hora</span>
              <span id="audHourText">0s / 7200s</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill fill-green" id="audHourFill" style="width: 0%"></div>
            </div>
          </div>

          <div class="quota-item">
            <div class="quota-info">
              <span>Segundos audio / día</span>
              <span id="audDayText">0s / 28800s</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill fill-green" id="audDayFill" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <button id="clearBtn" class="btn btn-danger">Borrar Key</button>
      <div class="footer-actions-right">
        <button id="saveBtn" class="btn btn-primary">Guardar Cambios</button>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
